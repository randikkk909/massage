<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massage Studio</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#faf7f2;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;color:#3c3028}
        .box{background:#fff;border-radius:20px;padding:30px;max-width:360px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.08);text-align:center}
        h1{font-size:22px;font-weight:300;letter-spacing:2px;color:#5e4e3e;margin-bottom:20px;text-transform:uppercase}
        h1 span{font-weight:600;color:#b08968}
        .tg-btn{display:block;width:100%;padding:14px;background:#2AABEE;color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:bold;text-decoration:none;margin-bottom:15px;cursor:pointer}
        input{width:100%;padding:14px;border:2px solid #e0d5c8;border-radius:12px;font-size:22px;text-align:center;letter-spacing:6px;margin-bottom:12px;outline:none;font-weight:bold}
        input:focus{border-color:#b08968}
        .btn{width:100%;padding:14px;background:#b08968;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:bold;cursor:pointer}
        .btn:active{opacity:.8}
        .msg{font-size:13px;color:#8b7b6b;margin:10px 0}
        .err{color:#c44;font-size:12px;min-height:18px}
        .info{background:#f5f0ea;padding:10px;border-radius:10px;font-size:12px;color:#5e4e3e;margin:12px 0;text-align:left;line-height:1.6}
        .divider{display:flex;align-items:center;gap:10px;margin:15px 0;color:#8b7b6b;font-size:12px}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e0d5c8}
    </style>
</head>
<body>
<div class="box">
    <h1>massage <span>studio</span></h1>
    <div id="loginForm">
        <a class="tg-btn" href="https://t.me/MassageLobnya_bot?start=web" target="_blank">📱 Войти через Telegram</a>
        <div class="info">Нажмите кнопку → откроется бот → нажмите <b>«Войти на сайт»</b> → вы авторизуетесь</div>
        <div class="divider">или введите код</div>
        <input type="text" id="code" maxlength="6" placeholder="000000" inputmode="numeric" autocomplete="off" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <button class="btn" onclick="login()">Войти по коду</button>
        <div class="err" id="err"></div>
    </div>
    <div id="loggedIn" style="display:none">
        <div style="width:60px;height:60px;border-radius:50%;background:#b08968;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 15px" id="ava"></div>
        <p class="msg" id="name"></p>
        <button class="btn" onclick="logout()">Выйти</button>
    </div>
</div>
<script>
var API='https://tgweb.bebraila5990d.workers.dev';

// СНАЧАЛА проверяем URL, ПОТОМ localStorage
(function(){
    var p=new URLSearchParams(window.location.search);
    if(p.get('user')){
        try{
            var u=JSON.parse(decodeURIComponent(p.get('user')));
            localStorage.setItem('muser',JSON.stringify(u));
            // Очищаем URL
            window.history.replaceState({},'',window.location.pathname);
            showUser(u);
            return;
        }catch(e){}
    }
    
    var s=localStorage.getItem('muser');
    if(s){
        try{
            var u=JSON.parse(s);
            showUser(u);
            return;
        }catch(e){}
    }
})();

function showUser(u){
    document.getElementById('loginForm').style.display='none';
    document.getElementById('loggedIn').style.display='block';
    document.getElementById('ava').textContent=u.avatar||'?';
    document.getElementById('name').textContent=u.name||'Пользователь';
}

async function login(){
    var c=document.getElementById('code').value.trim();
    if(!c||c.length!==6){document.getElementById('err').textContent='Введите 6 цифр';return}
    document.getElementById('err').textContent='Проверяем...';
    try{
        var r=await fetch(API+'/check?code='+c);
        var d=await r.json();
        if(d.ok){localStorage.setItem('muser',JSON.stringify(d.user));showUser(d.user)}
        else document.getElementById('err').textContent='Неверный код'
    }catch(e){document.getElementById('err').textContent='Ошибка соединения'}
}

function logout(){
    localStorage.removeItem('muser');
    document.getElementById('loginForm').style.display='block';
    document.getElementById('loggedIn').style.display='none';
    document.getElementById('code').value='';
    document.getElementById('err').textContent='';
}
</script>
</body>
</html>
