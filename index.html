eturn d.toISOString().split('T')[0]}function t2m(t){const[h,m]=t.split(':').map(Number);return h*60+m}function fDate(d){const[y,m,dd]=d.split('-');return`${dd}.${m}.${y}`}function isPast(a){const[h,m]=a.time.split(':').map(Number),d=new Date(a.date);d.setHours(h,m,0,0);return new Date()>new Date(d.getTime()+a.service.durationMin*60000)}function isTimePast(ds,ts){if(ds!==fmt(new Date()))return!1;return t2m(ts)<=new Date().getHours()*60+new Date().getMinutes()}function renderApp(){document.getElementById('appRoot').innerHTML=`<div class="header"><div class="logo">massage <span>lobnya</span></div><div class="user-bar"><div class="user-avatar">${currentUser.avatar||'👤'}</div><span>${currentUser.name}</span><span class="logout-link" id="logoutBtn">выйти</span></div></div><div class="screen active" id="bookingScreen"><h2>Вид массажа</h2><div id="svc" class="services-list"></div><h2 class="section-anchor" id="ds">Дата</h2><div id="dt" class="date-scroll"></div><h2 class="section-anchor" id="ts">Время</h2><div id="tm" class="time-grid"></div><div id="sum" class="selected-summary"></div><div class="btn-wrap" id="bw"><button class="primary-btn" id="bkBtn">Записаться</button></div><button class="admin-toggle" id="admTg">🔑 панель администратора</button><div id="admPn" style="display:none"></div></div><div class="screen" id="appointmentsScreen"><h2>Мои записи</h2><div id="apptList"></div></div><div class="screen" id="reviewsScreen"><h2>Отзывы</h2><div class="review-form" id="rvForm"><div style="font-weight:500;font-size:14px;margin-bottom:8px;color:#5e4e3e">Оставить отзыв</div><div class="stars-interactive" id="stars"><span class="star" data-star="1">★</span><span class="star" data-star="2">★</span><span class="star" data-star="3">★</span><span class="star" data-star="4">★</span><span class="star" data-star="5">★</span></div><input type="text" id="rvAuthor" placeholder="Ваше имя" maxlength="30"><textarea id="rvText" placeholder="Поделитесь впечатлениями..." maxlength="500"></textarea><button class="submit-review-btn" id="rvSubmit">Отправить отзыв</button><div class="review-limit-msg" id="rvMsg"></div></div><div id="rvList"></div></div><div class="bottom-nav"><button class="nav-item active" data-screen="booking"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#b7a797" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Запись</button><button class="nav-item" data-screen="appointments"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#b7a797" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="14" y2="13"/></svg>Мои записи</button><button class="nav-item" data-screen="reviews"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#b7a797" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Отзывы</button></div>`;document.getElementById('logoutBtn').onclick=logout;document.getElementById('bkBtn').onclick=book;document.getElementById('admTg').onclick=toggleAdmin;document.getElementById('rvSubmit').onclick=submitReview;document.querySelectorAll('.nav-item').forEach(b=>b.onclick=()=>switchScreen(b.dataset.screen));document.querySelectorAll('#stars .star').forEach(s=>s.onclick=()=>{reviewRating=+s.dataset.star;updateStars()});renderServices();renderDates();renderSlots();renderAppointments();renderReviews();updateSummary()}function switchScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id+'Screen').classList.add('active');document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.screen===id))}function updateStars(){document.querySelectorAll('#stars .star').forEach((s,i)=>s.classList.toggle('active',i<reviewRating))}function renderServices(){document.getElementById('svc').innerHTML=SERVICES.map(s=>`<div class="service-card${selService&&selService.id===s.id?' selected':''}" data-id="${s.id}"><div><div class="service-name">${s.name}</div><div class="service-duration">${s.duration}</div></div><div class="radio-circle"></div></div>`).join('');document.querySelectorAll('.service-card').forEach(c=>c.onclick=()=>{selService=SERVICES.find(s=>s.id===c.dataset.id);selTime=null;renderServices();renderSlots();updateSummary();scrollTo(document.getElementById('ds'))})}function renderDates(){const dates=getDates(),bs=new Set(blockedDays);document.getElementById('dt').innerHTML=dates.map(d=>{const ds=fmt(d);return`<div class="date-btn${ds===selDate?' selected':''}${bs.has(ds)?' blocked':''}${ds<fmt(new Date())?' past':''}" data-date="${ds}">${d.getDate()}<br><small>${d.toLocaleDateString('ru',{month:'short'})}</small></div>`}).join('');document.querySelectorAll('.date-btn:not(.blocked):not(.past)').forEach(b=>b.onclick=()=>{selDate=b.dataset.date;selTime=null;renderDates();renderSlots();updateSummary();scrollTo(document.getElementById('ts'))})}function renderSlots(){const c=document.getElementById('tm');if(!selDate){c.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--text2);padding:16px">Сначала выберите дату</div>';return}if(!selService){c.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--text2);padding:16px">Сначала выберите вид массажа</div>';return}const bs=new Set(blockedSlots.filter(s=>s.date===selDate).map(s=>s.time)),dm=selService.durationMin;c.innerHTML=ALL_SLOTS.map(t=>{const ab=bs.has(t),past=isTimePast(selDate,t);const ap=appointments.some(a=>{if(a.date!==selDate)return!1;const as=t2m(a.time);return t2m(t)<(as+a.service.durationMin+15)&&(t2m(t)+dm+15)>as});const bl=ab||ap||past,sel=t===selTime&&!bl;return`<div class="time-slot${sel?' selected':''}${ab?' blocked':''}${past?' past-time':''}${ap&&!ab&&!past?' booked':''}" data-time="${t}">${t}</div>`}).join('');document.querySelectorAll('.time-slot:not(.blocked):not(.booked):not(.past-time)').forEach(s=>s.onclick=()=>{selTime=s.dataset.time;renderSlots();updateSummary();scrollTo(document.getElementById('bw'))})}function scrollTo(el){if(!el)return;setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'center'}),100)}function updateSummary(){const p=[];if(selService)p.push(selService.name+' · '+selService.duration);if(selDate)p.push(fDate(selDate));if(selTime)p.push(selTime);document.getElementById('sum').textContent=p.join(' | ')}async function sendTG(chatId,text){try{await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:chatId,text:text,parse_mode:'HTML'})})}catch(e){}}function showSuccess(svc,date,time){document.querySelectorAll('.success-overlay,.cancel-overlay').forEach(o=>o.remove());const ov=document.createElement('div');ov.className='success-overlay';ov.innerHTML=`<div class="success-modal"><div class="success-icon-circle"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#8faa7b" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><div class="success-big-text">Вы записаны!</div><div class="success-sub-text">${svc.name} · ${svc.duration}</div><div class="success-info-box"><div class="success-info-row"><span class="l">Дата</span><span class="v">${fDate(date)}</span></div><div class="success-info-row"><span class="l">Время</span><span class="v">${time}</span></div></div><button class="success-ok-btn" id="clsOk">Хорошо</button></div>`;document.body.appendChild(ov);const cl=()=>{ov.style.opacity='0';ov.style.transition='opacity 0.25s';setTimeout(()=>ov.remove(),250)};document.getElementById('clsOk').onclick=cl;ov.addEventListener('click',e=>{if(e.target===ov)cl()})}function book(){if(!selService)return alert('Выберите вид массажа');if(!selDate)return alert('Выберите дату');if(!selTime)return alert('Выберите время');appointments.push({id:Date.now(),service:selService,date:selDate,time:selTime});saveData();showSuccess(selService,selDate,selTime);ADMIN_IDS.forEach(id=>{sendTG(id,`🆕 <b>Новая запись!</b>\n\n👤 Клиент: ${currentUser.name}\n💆 Услуга: ${selService.name}\n📅 Дата: ${fDate(selDate)}\n⏰ Время: ${selTime}\n🕐 Длительность: ${selService.duration}\n📱 Telegram ID: ${currentUser.id}`)});sendTG(currentUser.id,`✅ <b>Вы записаны!</b>\n\n💆 ${selService.name}\n📅 ${fDate(selDate)}\n⏰ ${selTime}\n🕐 ${selService.duration}\n\n📍 г. Лобня, Катюшки 58\n📞 +7 968 513 2011`);selTime=null;renderSlots();updateSummary();renderAppointments()}function renderAppointments(){const c=document.getElementById('apptList');if(!appointments.length){c.innerHTML='<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cdb19c" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="14" y2="13"/></svg>У вас пока нет записей</div>';return}const s=[...appointments].sort((a,b)=>(isPast(a)?1:0)-(isPast(b)?1:0)||(a.date+a.time).localeCompare(b.date+b.time));c.innerHTML=s.map(a=>`<div class="card"><div class="card-row"><div><div class="card-service">${a.service.name} · ${a.service.duration}</div><div style="font-size:13px"><strong>${fDate(a.date)}</strong> · ${a.time}</div></div><div style="display:flex;align-items:center;gap:8px"><span class="card-status ${isPast(a)?'past':'upcoming'}">${isPast(a)?'Завершён':'Ожидается'}</span>${!isPast(a)?`<button class="cancel-btn" data-id="${a.id}">Отменить</button>`:''}</div></div></div>`).join('');document.querySelectorAll('.cancel-btn').forEach(b=>b.onclick=()=>cancelAppt(+b.dataset.id))}function cancelAppt(id){const a=appointments.find(x=>x.id===id);if(!a)return;document.querySelectorAll('.cancel-overlay').forEach(o=>o.remove());const ov=document.createElement('div');ov.className='cancel-overlay';ov.innerHTML=`<div class="cancel-modal"><div class="cancel-icon-circle"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#c4956a" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div><div class="cancel-big-text">Отменить запись?</div><div class="cancel-sub-text">${a.service.name}<br>${fDate(a.date)} в ${a.time}</div><div class="cancel-btns"><button class="cancel-btn-no" id="noBtn">Нет</button><button class="cancel-btn-yes" id="yesBtn">Да, отменить</button></div></div>`;document.body.appendChild(ov);const cl=()=>{ov.style.opacity='0';ov.style.transition='opacity 0.25s';setTimeout(()=>ov.remove(),250)};document.getElementById('noBtn').onclick=cl;document.getElementById('yesBtn').onclick=()=>{appointments=appointments.filter(x=>x.id!==id);saveData();cl();sendTG(currentUser.id,`❌ <b>Запись отменена</b>\n\n${a.service.name}\n${fDate(a.date)} в ${a.time}`);setTimeout(()=>{renderAppointments();updateReviewForm()},300)}}function submitReview(){if(reviews.some(r=>r.userId===currentUser.id))return alert('Вы уже оставили отзыв');if(!appointments.some(a=>isPast(a)))return alert('Посетите массаж, чтобы оставить отзыв');const author=document.getElementById('rvAuthor').value.trim()||currentUser.name;const text=document.getElementById('rvText').value.trim();if(!text)return alert('Напишите отзыв');if(!reviewRating)return alert('Поставьте оценку');reviews.push({id:Date.now(),userId:currentUser.id,author,text,stars:reviewRating,date:new Date().toLocaleDateString('ru',{day:'numeric',month:'long',year:'numeric'})});saveData();document.getElementById('rvAuthor').value='';document.getElementById('rvText').value='';reviewRating=0;updateStars();renderReviews()}function renderReviews(){const c=document.getElementById('rvList');if(!reviews.length){c.innerHTML='<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cdb19c" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="12" y2="13"/></svg>Отзывов пока нет</div>';return}c.innerHTML=reviews.slice().reverse().map(r=>`<div class="review-card">${r.userId===currentUser?.id?`<button class="delete-review-btn" data-id="${r.id}">×</button>`:''}<div class="review-header"><div class="review-author">${r.author}</div><div class="review-date">${r.date}</div></div><div class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div><div class="review-text">${r.text}</div></div>`).join('');document.querySelectorAll('.delete-review-btn').forEach(b=>b.onclick=()=>{reviews=reviews.filter(r=>r.id!==+b.dataset.id);saveData();renderReviews();updateReviewForm()});updateReviewForm()}function updateReviewForm(){const f=document.getElementById('rvForm'),m=document.getElementById('rvMsg');const hp=appointments.some(a=>isPast(a)),hr=reviews.some(r=>r.userId===currentUser?.id);if(!hp&&!hr){f.classList.add('disabled');m.textContent='Посетите массаж, чтобы оставить отзыв'}else if(hr){f.classList.add('disabled');m.textContent='Вы уже оставили отзыв'}else{f.classList.remove('disabled');m.textContent=''}}function toggleAdmin(){const p=document.getElementById('admPn');if(p.style.display==='block'){p.style.display='none';return}const dates=getDates();p.innerHTML=`<div class="admin-panel"><div style="font-weight:500;margin-bottom:10px;font-size:14px">Управление доступностью</div><div class="admin-row"><select id="admDate">${dates.map(d=>`<option value="${fmt(d)}">${fDate(fmt(d))}</option>`).join('')}</select><select id="admTime">${ALL_SLOTS.map(t=>`<option value="${t}">${t}</option>`).join('')}</select><button class="mini-btn danger" id="blSlot">Заблокировать слот</button></div><div class="admin-row"><button class="mini-btn danger" id="blDay">Заблокировать день</button><button class="mini-btn" id="unDay">Разблокировать день</button></div></div>`;p.style.display='block';document.getElementById('blSlot').onclick=()=>{blockedSlots.push({date:document.getElementById('admDate').value,time:document.getElementById('admTime').value});saveData();renderSlots();toggleAdmin()};document.getElementById('blDay').onclick=()=>{blockedDays.push(document.getElementById('admDate').value);saveData();renderDates();renderSlots();toggleAdmin()};document.getElementById('unDay').onclick=()=>{blockedDays=blockedDays.filter(d=>d!==document.getElementById('admDate').value);saveData();renderDates();renderSlots();toggleAdmin()}}})();
