<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massage Studio</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #faf7f2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 { font-size: 22px; color: #5e4e3e; margin-bottom: 20px; }
        h1 span { color: #b08968; }
        .tg-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            background: #2AABEE;
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        .tg-btn svg { width: 22px; height: 22px; fill: #fff; }
        .step { display: none; }
        .step.active { display: block; }
        .code-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0d5c8;
            border-radius: 12px;
            font-size: 22px;
            text-align: center;
            letter-spacing: 6px;
            margin-bottom: 12px;
            outline: none;
        }
        .code-input:focus { border-color: #b08968; }
        .btn {
            width: 100%;
            padding: 14px;
            background: #b08968;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        .back { color: #b08968; cursor: pointer; font-size: 13px; margin-top: 10px; display: block; }
        .msg { font-size: 13px; color: #8b7b6b; margin: 10px 0; }
        .err { color: #c44; font-size: 12px; }
        .avatar {
            width: 60px; height: 60px; border-radius: 50%;
            background: #b08968; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; margin: 0 auto 15px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>massage <span>studio</span></h1>

    <div class="step active" id="step1">
        <p class="msg">Войдите через Telegram</p>
        <button class="tg-btn" onclick="startLogin()">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.2c-.07-.06-.17-.04-.24-.02-.1.02-1.71 1.09-4.83 3.19-.46.32-.87.47-1.24.46-.41-.01-1.19-.23-1.77-.42-.71-.23-1.28-.35-1.23-.74.03-.2.3-.41.83-.62 3.23-1.41 5.38-2.34 6.45-2.78 3.07-1.28 3.71-1.5 4.13-1.51.09 0 .3.02.43.13.11.09.14.22.15.31.01.09.02.29.01.44z"/></svg>
            Получить код в Telegram
        </button>
    </div>

    <div class="step" id="step2">
        <p class="msg">Введите код из бота:</p>
        <input type="text" class="code-input" id="codeInput" maxlength="6" placeholder="000000">
        <button class="btn" onclick="verifyCode()">Войти</button>
        <span class="back" onclick="back()">← Назад</span>
        <div class="err" id="err"></div>
    </div>

    <div class="step" id="step3">
        <div class="avatar" id="ava"></div>
        <p class="msg" id="okName"></p>
        <button class="btn" onclick="logout()">Выйти</button>
    </div>
</div>

<script>
    const WORKER_URL = 'https://massage-bot.bebraila5990d.workers.dev';
    const BOT = 'MassageLobnya_bot';
    let myCode = null, timer = null;

    const saved = localStorage.getItem('mu');
    if (saved) { const u = JSON.parse(saved); showOk(u); }

    function startLogin() {
        myCode = String(Math.floor(100000 + Math.random() * 900000));
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        document.getElementById('err').textContent = '';
        document.getElementById('codeInput').value = '';
        document.getElementById('codeInput').focus();
        window.open('https://t.me/' + BOT + '?start=' + myCode, '_blank');
        let n = 0;
        timer = setInterval(async () => {
            n++;
            if (n > 120) { clearInterval(timer); return; }
            try {
                const r = await fetch(WORKER_URL + '/check?code=' + myCode);
                const d = await r.json();
                if (d.ok) { clearInterval(timer); saveUser(d.user); }
            } catch(e) {}
        }, 1500);
    }

    async function verifyCode() {
        const c = document.getElementById('codeInput').value.trim();
        if (!c || c.length !== 6) { document.getElementById('err').textContent = 'Введите 6 цифр'; return; }
        try {
            const r = await fetch(WORKER_URL + '/check?code=' + c);
            const d = await r.json();
            if (d.ok) { clearInterval(timer); saveUser(d.user); }
            else document.getElementById('err').textContent = 'Неверный код';
        } catch(e) { document.getElementById('err').textContent = 'Ошибка'; }
    }

    function saveUser(u) { localStorage.setItem('mu', JSON.stringify(u)); showOk(u); }
    function showOk(u) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step3').classList.add('active');
        document.getElementById('ava').textContent = u.avatar;
        document.getElementById('okName').textContent = u.name;
    }
    function back() { clearInterval(timer); document.getElementById('step2').classList.remove('active'); document.getElementById('step1').classList.add('active'); }
    function logout() { localStorage.removeItem('mu'); document.getElementById('step3').classList.remove('active'); document.getElementById('step1').classList.add('active'); }
</script>
</body>
</html>
